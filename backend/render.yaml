services:
  - type: web
    name: emotracker-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: emotracker-mongodb
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: emotracker-mongodb
    plan: free